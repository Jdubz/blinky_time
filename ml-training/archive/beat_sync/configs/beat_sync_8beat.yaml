# Beat-Sync 8-Beat Context — tests whether longer context helps downbeat detection
# 8 beats captures full 2-bar pattern in 4/4 time.
# Same hidden layers as baseline to isolate the effect of more context.

model:
  type: "beat_sync"
  n_beats: 8
  features_per_beat: 79
  hidden1: 32
  hidden2: 16
  dropout: 0.15
  phase: "A"

training:
  batch_size: 256
  epochs: 200
  learning_rate: 0.003
  lr_schedule: "cosine"
  pos_weight: 2.3
  loss: "bce"
  focal_gamma: 2.0
  patience: 25
  seed: 42

beat_features:
  subdivisions: 2
  include_peak: true
  include_std: false
  jitter_ms: 15
  feature_noise_std: 0.03
  beat_drop_prob: 0.05
  beat_insert_prob: 0.03

export:
  max_model_size_kb: 25
  output_header: "../blinky-things/audio/beat_sync_model_data.h"
  c_array_name: "beat_sync_model_data"
