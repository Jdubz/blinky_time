# Conv1D W16 v11 — onset detection with proper onset labels + delta features
#
# Key improvements over v3/v10 (F1=0.668 clean baseline):
#
#   1. Onset consensus labels (madmom CNN + librosa + essentia)
#      - Trains on acoustic onset positions, not metrical beat positions
#      - Directly matches the onset detection task
#      - ~1.7x denser labels than beat consensus
#
#   2. Delta features (first-order mel differences)
#      - Spectral flux is the #1 onset detection signal
#      - Model no longer has to learn to compute differences
#      - Input: 52 channels (26 mel + 26 delta) instead of 26
#      - First conv layer: 52→32 (wider to handle richer input)
#
#   3. Label neighbor weighting (Rong Gong et al. 2018)
#      - Frames adjacent to onsets get 0.25× onset value
#      - Provides gradient at neighboring frames
#
#   4. LR warmup (3 epochs linear ramp)
#      - Stabilizes early training with large batches
#
# Architecture: Conv1D(52→32, k=5) → Conv1D(32→32, k=5) → Conv1D(32→1, k=1)
# ~10K params, <15 KB INT8
#
# Retained from v3/v10 (proven):
#   - Asymmetric focal loss (gamma_pos=0.5, gamma_neg=2.0)
#   - pos_weight=auto (onset labels are ~6% positive vs beats ~2.8%, so v3's
#     hardcoded 20 is too high. Auto gives ~15.5 which is appropriate.)
#   - Online mixup (Beta(0.4,0.4), p=0.5)
#   - Frequency positional encoding (52-dim with deltas)
#   - Full augmentation pipeline

model:
  type: "frame_conv1d"
  channels: [32, 32]              # Wider first layer for 52-dim input
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: true

labels:
  target_type: "binary"
  labels_type: "onset_consensus"
  onset_consensus_dir: "/mnt/storage/blinky-ml-data/labels/onsets_consensus"
  neighbor_weight: 0.25           # Frames at onset±1 get 0.25× onset value (Schluter/Bock 2014)
  label_shift_frames: 1           # Shift targets 1 frame earlier — compensates for inherent
                                  # 1-frame causal delay (Bock 2012 online onset detection).
                                  # Model learns to predict next frame's onset state.
  early_neighbor_frames: 0        # Disabled — backtracking showed that shifting labels beyond
  early_neighbor_weight: 0.0      # the energy rise start degrades F1 (0.709 → 0.511)

features:
  use_delta: true                 # Append first-order mel differences (26→52 input)

loss:
  type: "asymmetric_focal"
  gamma_pos: 0.5
  gamma_neg: 2.0

training:
  mixup: true
  mixup_alpha: 0.4
  epochs: 60
  patience: 15
  pos_weight: 0                    # Auto-calculate (onset labels ~6% positive → auto ~15.5)

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v11.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 15
