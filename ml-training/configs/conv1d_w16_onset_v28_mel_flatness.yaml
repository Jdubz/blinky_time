# Conv1D W16 v28 variant — mel + flatness (single-feature ablation)
#
# Ablation to answer: does JUST flatness (the half of v27-hybrid's
# input pair) help on its own? Gate-c R² vs mel = 0.85 — mostly
# mel-learnable, so prior expectation is LITTLE help. This run is
# mainly a reference point to quantify "how much of v27's advantage
# came from flatness alone?"
#
# Input: 30 mel + flatness = 31 channels.

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false
  num_output_channels: 0

labels:
  target_type: "binary"
  labels_type: "kick_weighted"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_drums"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

audio:
  n_mels: 30
  fmin: 40
  fmax: 4000

features:
  use_delta: false
  use_pcen: false
  hybrid_features: [flatness]

loss:
  type: "asymmetric_focal"
  gamma_pos: 0.0
  gamma_neg: 4.0

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0

augmentation:
  freq_mixstyle:
    enabled: true
    p: 0.5
    alpha: 0.6

data:
  # flatness is at storage column n_mels = 30 (first hybrid slot). This
  # config's hybrid_features=[flatness] IS a prefix of the storage order,
  # so the legacy max_features path would also work; but we pass
  # stored_hybrid_features for explicit/uniform behaviour with the other
  # single-feature variants.
  processed_dir: "/mnt/storage/blinky-ml-data/processed_v28"
  stored_hybrid_features: [flatness, raw_flux, crest, hfc]

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v28_mel_flatness.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 25
