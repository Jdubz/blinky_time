# Base Configuration — shared audio, training, and data settings
#
# This file is the single source of truth for settings that must match
# the firmware (audio section) or are shared across all model variants
# (training, quantization, data paths).
#
# Model-specific configs (default.yaml, wider_rf.yaml) import these
# settings and only override what differs (model architecture, export budget).

# Audio feature extraction (must match firmware SharedSpectralAnalysis exactly)
audio:
  sample_rate: 16000        # PDM mic rate
  n_fft: 256                # FFT-256
  hop_length: 256           # No overlap (hop = FFT size)
  n_mels: 26                # SharedSpectralAnalysis NUM_MEL_BANDS
  fmin: 60                  # MEL_MIN_FREQ
  fmax: 8000                # MEL_MAX_FREQ
  frame_rate: 62.5          # 16000 / 256
  target_rms_db: -35        # Normalize audio RMS to simulate firmware AGC level
  # AGC ceiling — must agree with firmware AdaptiveMic.h hwGainMaxSignal.
  # Gain sweep calibration shows SNR peaks at 25-35, degrades above 40.
  # prepare_dataset.py uses this to cap gain-aware noise augmentation.
  hw_gain_max: 40           # Firmware default: 40 (AdaptiveMic.h v56)
  # Spectral noise subtraction (Martin 2001 min-statistics, firmware v56)
  # Applied to FFT magnitudes before mel projection. Mirrors firmware
  # SharedSpectralAnalysis::estimateAndSubtractNoise().
  noise_subtraction:
    enabled: true             # ON for training — matches firmware inference path
    smooth_alpha: 0.92        # Power smoothing EMA (firmware: noiseSmoothAlpha)
    release_factor: 0.999     # Noise floor release rate (firmware: noiseReleaseFactor)
    oversubtract: 1.5         # Oversubtraction factor (firmware: noiseOversubtract)
    floor_ratio: 0.02         # Spectral floor fraction (firmware: noiseFloorRatio)

# Target label generation
labels:
  sigma_frames: 2           # Gaussian smoothing width (±32ms at 62.5 Hz)
  beat_value: 1.0           # Peak activation at beat center
  nonbeat_value: 0.0        # Background activation

# Training hyperparameters (shared across model variants)
training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  lr_schedule: "cosine"
  chunk_frames: 128         # ~2s chunks at 62.5 Hz
  chunk_stride: 64          # 50% overlap between chunks
  pos_weight: 4.7           # BCE positive class weight for beat head (measured 17.7% positive ratio)
  downbeat_pos_weight: 10.5 # BCE positive class weight for downbeat head (measured 8.7% positive ratio)
  val_split: 0.15
  seed: 42

# Quantization
quantization:
  method: "qat"             # quantization-aware training
  target_bits: 8            # INT8

# Export defaults (model configs may override max_model_size_kb)
export:
  output_header: "../blinky-things/audio/beat_model_data.h"
  c_array_name: "beat_model_data"

# Data paths (bulk data on /mnt/storage, processed data local for fast training)
data:
  audio_dir: "/mnt/storage/blinky-ml-data/audio"
  labels_dir: "/mnt/storage/blinky-ml-data/labels/consensus"
  processed_dir: "data/processed"
  rir_dir: "/mnt/storage/blinky-ml-data/rir/processed"
  test_set: "../blinky-test-player/music/edm"
