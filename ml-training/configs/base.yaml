# Base Configuration — shared audio, training, and data settings
#
# This file is the single source of truth for settings that must match
# the firmware (audio section) or are shared across all model variants
# (training, quantization, data paths).
#
# Model-specific configs (default.yaml, wider_rf.yaml) import these
# settings and only override what differs (model architecture, export budget).

# Audio feature extraction (must match firmware SharedSpectralAnalysis exactly)
audio:
  sample_rate: 16000        # PDM mic rate
  n_fft: 256                # FFT-256
  hop_length: 256           # No overlap (hop = FFT size)
  n_mels: 26                # SharedSpectralAnalysis NUM_MEL_BANDS
  fmin: 60                  # MEL_MIN_FREQ
  fmax: 8000                # MEL_MAX_FREQ
  log_epsilon: 1e-7         # Must match firmware SharedSpectralAnalysis (ARM denormal safe)
  frame_rate: 62.5          # 16000 / 256
  target_rms_db: -63        # Normalize audio RMS to simulate firmware AGC level
  # Calibrated via tools/rms_mel_sweep.py: -63 dB → mel mean 0.52, matching
  # firmware AGC output. Previous -35 dB gave mel mean 0.75, causing weak
  # NN activations on device (max ~0.26 at 120 BPM).
  # AGC ceiling — must agree with firmware AdaptiveMic.h hwGainMaxSignal.
  # Gain sweep calibration shows SNR peaks at 25-35, degrades above 40.
  # prepare_dataset.py uses this to cap gain-aware noise augmentation.
  hw_gain_max: 32           # Firmware fixed gain: nRF52840=32, ESP32-S3=30 (AGC removed v72)
  # Spectral noise subtraction (Martin 2001 min-statistics, firmware v56)
  # Applied to FFT magnitudes before mel projection. Mirrors firmware
  # SharedSpectralAnalysis::estimateAndSubtractNoise().
  noise_subtraction:
    enabled: false            # OFF — firmware default is noiseest=0 (A/B tested: hurts BPM accuracy)
    smooth_alpha: 0.92        # Power smoothing EMA (firmware: noiseSmoothAlpha)
    release_factor: 0.999     # Noise floor release rate (firmware: noiseReleaseFactor)
    oversubtract: 1.5         # Oversubtraction factor (firmware: noiseOversubtract)
    floor_ratio: 0.02         # Spectral floor fraction (firmware: noiseFloorRatio)

# Target label generation
labels:
  target_type: "binary"     # "binary" (v6+: 1 frame per beat) or "gaussian" (v1-v5)
  sigma_frames: 2           # Gaussian smoothing width, only used if target_type is "gaussian"
  beat_value: 1.0           # Peak activation at beat center
  nonbeat_value: 0.0        # Background activation

# Training hyperparameters (shared across model variants)
training:
  batch_size: 4096          # Large batch for small models (FC: 55K params). ~53 MB on GPU.
  epochs: 60                # Convergence typically by epoch 40-50; cosine LR sized to match.
  learning_rate: 0.001
  lr_schedule: "cosine"
  chunk_frames: 128         # ~2s chunks at 62.5 Hz
  chunk_stride: 64          # 50% overlap between chunks
  subsample: 0.5            # Fraction of training data per epoch (0-1). Random subset each epoch.
                            # With 7.8M chunks and 55K params, 50% per epoch is plenty.
                            # All data is still seen across every 2 epochs.
  num_workers: 4            # DataLoader workers
  pos_weight: 20              # v3 used 20 (achieved F1=0.787). Auto (0) gives ~35.6 which over-weights positives.
  patience: 10               # Early stopping: stop after N epochs with no val_loss improvement
  min_quality: 0.0            # Minimum label quality_score to include track (0.0 = no filtering)
  val_split: 0.15
  seed: 42

# Augmentation settings (used by prepare_dataset.py when --augment is passed)
augmentation:
  # Resample-based time stretch: diversifies BPM distribution.
  # Training data is 33.5% at 120-140 BPM — these factors spread it out.
  # 0.8x: 120→96, 1.2x: 120→144 BPM. Pitch changes are fine for beat detection.
  # Stretched variants get clean audio only (no noise/gain/RIR on top).
  time_stretch_factors: [0.8, 0.9, 1.1, 1.2]
  # Pitch shifting (semitones): key-invariant augmentation.
  # Beat This! ablation: removing pitch shift drops F1 by 4.3 points —
  # second most impactful augmentation after time stretch.
  # Applied to original speed audio only. Uses torchaudio.functional.pitch_shift.
  pitch_shift_semitones: [-5, -3, -1, 1, 3, 5]
  # SpecAugment frequency masking (applied online during training).
  # Masks random mel bands to prevent over-reliance on any single frequency.
  # Beat This! uses this as their third most impactful augmentation.
  spec_augment:
    enabled: true
    num_freq_masks: 2       # Number of random frequency masks per sample
    max_freq_width: 4       # Max mel bands masked per mask (of 26 total)
    num_time_masks: 1       # Number of random time masks per sample
    max_time_width: 8       # Max frames masked per mask

# Loss function defaults
loss:
  type: "shift_bce"          # shift-tolerant BCE (Beat This!)
  shift_tolerance: 3         # ±3 frames = ±48ms at 62.5 Hz (annotation jitter tolerance)

# Knowledge distillation defaults
distillation:
  alpha: 0.3                 # Weight for soft loss: (1-alpha)*hard + alpha*soft
  temperature: 2.0           # Softening temperature

# Quantization
quantization:
  method: "qat"             # quantization-aware training
  target_bits: 8            # INT8

# Export defaults (model configs may override)
export:
  output_header: "../blinky-things/audio/frame_beat_model_data.h"
  c_array_name: "frame_beat_model_data"

# Data paths — all bulk data on /mnt/storage to avoid filling the primary drive.
# Processed data is large (80-130 GB per version) and regenerable from audio+labels.
data:
  audio_dir: "/mnt/storage/blinky-ml-data/audio/combined"
  labels_dir: "/mnt/storage/blinky-ml-data/labels/consensus_v5"
  processed_dir: "/mnt/storage/blinky-ml-data/processed"
  rir_dir: "/mnt/storage/blinky-ml-data/rir/processed"
  noise_dir: "/mnt/storage/blinky-ml-data/noise"
  mel_cache_dir: "/mnt/storage/blinky-ml-data/mel_cache"
  test_set: "../blinky-test-player/music/edm"
