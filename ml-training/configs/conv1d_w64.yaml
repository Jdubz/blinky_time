# Single Conv1D W64 — onset detection (legacy config, superseded by W16)
#
# Architecture: Conv1D(26->24, k=5) -> Conv1D(24->32, k=5) -> Conv1D(32->1, k=1)
#   W64 = 1.024s context (~2 beats at 120 BPM)
#   ~7K params, ~7 KB INT8, ~26ms inference on Cortex-M4F
#   Receptive field: 9 frames = 144ms

model:
  type: "frame_conv1d"
  channels: [24, 32]
  kernel_sizes: [5, 5]
  window_frames: 64
  dropout: 0.1

export:
  output_header: "../blinky-things/audio/frame_beat_model_data.h"
  c_array_name: "frame_beat_model_data"
  max_model_size_kb: 20
