# Beat Activation CNN — 3-layer baseline
#
# Shared settings are in base.yaml and merged automatically by load_config().
# This file only contains model-specific overrides.

model:
  type: "causal_cnn"
  channels: 32              # Conv filter count
  kernel_size: 3
  dilations: [1, 2, 4]      # Receptive field: 15 frames = 240ms
  dropout: 0.1
  downbeat: true

export:
  max_model_size_kb: 25     # ~20 KB INT8 for 3-layer model
