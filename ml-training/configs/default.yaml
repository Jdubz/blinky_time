# Beat Activation CNN — Training Configuration
# Matches firmware audio pipeline in SharedSpectralAnalysis.h

# Audio feature extraction (must match firmware exactly)
audio:
  sample_rate: 16000        # PDM mic rate
  n_fft: 256                # FFT-256
  hop_length: 256           # No overlap (hop = FFT size)
  n_mels: 26                # SharedSpectralAnalysis NUM_MEL_BANDS
  fmin: 60                  # MEL_MIN_FREQ
  fmax: 8000                # MEL_MAX_FREQ
  frame_rate: 62.5          # 16000 / 256

# Target label generation
labels:
  sigma_frames: 2           # Gaussian smoothing width (±32ms at 62.5 Hz)
  beat_value: 1.0           # Peak activation at beat center
  nonbeat_value: 0.0        # Background activation

# Model architecture
model:
  type: "causal_cnn"        # or "tcn"
  channels: 32              # Conv filter count
  kernel_size: 3
  dilations: [1, 2, 4]      # Receptive field: 21 frames = 336ms
  dropout: 0.1

# Training
training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  lr_schedule: "cosine"
  chunk_frames: 128         # ~2s chunks at 62.5 Hz
  chunk_stride: 64          # 50% overlap between chunks
  pos_weight: 10.0          # BCE positive class weight (~10:1 neg:pos ratio)
  val_split: 0.15
  seed: 42

# Quantization
quantization:
  method: "qat"             # quantization-aware training
  target_bits: 8            # INT8

# Export
export:
  max_model_size_kb: 20     # Reject models larger than this
  output_header: "../blinky-things/audio/beat_model_data.h"
  c_array_name: "beat_model_data"

# Data paths
data:
  audio_dir: "data/audio"
  labels_dir: "data/labels"
  processed_dir: "data/processed"
  test_set: "../blinky-test-player/music/edm"  # Existing 18-track test set
