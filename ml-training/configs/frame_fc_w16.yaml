# Frame-level FC — 16-frame window (256ms) for sharper onset detection
#
# Smaller window trades context for latency. May produce sharper beat
# activations at the cost of less temporal context for tempo estimation.
# ~14K params, ~14 KB INT8.

model:
  type: "frame_fc"
  window_frames: 16         # 16 frames = 256ms at 62.5 Hz
  hidden_dims: [64, 32]
  dropout: 0.1

export:
  output_header: "../blinky-things/audio/frame_beat_model_data.h"
  c_array_name: "frame_beat_model_data"
  max_model_size_kb: 20
