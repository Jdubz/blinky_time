# Conv1D W64 v2 — tempo auxiliary head + confidence-weighted loss (legacy, superseded by W16)
#
# Architecture:
#   Conv1D(26->24, k=5) -> Conv1D(24->32, k=5) -> Conv1D(32->1, k=1)
#   W64 = 1.024s context (~2 beats at 120 BPM)
#   ~7K params + 660 tempo head params (training only)
#   15.1 KB INT8, ~27ms inference on Cortex-M4F

model:
  type: "frame_conv1d"
  channels: [24, 32]
  kernel_sizes: [5, 5]
  window_frames: 64
  dropout: 0.1
  num_tempo_bins: 20
  tempo:
    min_bpm: 60
    max_bpm: 200
    loss_weight: 0.1

loss:
  type: "confidence_shift_bce"
  shift_tolerance: 3

export:
  output_header: "../blinky-things/audio/frame_beat_model_data.h"
  c_array_name: "frame_beat_model_data"
  max_model_size_kb: 20
