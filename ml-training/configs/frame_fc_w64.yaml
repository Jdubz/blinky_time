# Frame-level FC — 64-frame window (1024ms) for maximum temporal context
#
# Sees ~2 full beats at 120 BPM. Maximum context but largest model.
# 64×26=1664 input features → hidden dims kept small to fit INT8 budget.
# ~55K params, ~55 KB INT8.

model:
  type: "frame_fc"
  window_frames: 64         # 64 frames = 1024ms at 62.5 Hz
  hidden_dims: [32, 16]     # Small hidden dims for large input (1664 features)
  dropout: 0.1
  downbeat: true

export:
  output_header: "../blinky-things/audio/frame_beat_model_data.h"
  c_array_name: "frame_beat_model_data"
  max_model_size_kb: 60
