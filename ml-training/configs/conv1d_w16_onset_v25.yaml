# Conv1D W16 v25 — Bias init + recalibrated levels + Freq-MixStyle
#
# Key change: output bias initialized to log(pos_ratio / (1-pos_ratio))
# so the model starts at sigmoid ~ 0.07 (matching positive class prior)
# instead of sigmoid(0) = 0.5. Prevents the flat high-baseline activation
# that made on-device threshold detection fail (mean=0.6, std=0.035).
#
# Same training recipe as v24 (recalibrated -72 dB, Freq-MixStyle,
# speaker THD, comb filter, MEMS soft clip, mic profile).
#
# Architecture: Conv1D(26->32, k=5) -> Conv1D(32->32, k=5) -> Conv1D(32->1, k=1)

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false

labels:
  target_type: "binary"
  labels_type: "kick_weighted"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_drums"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

features:
  use_delta: false
  use_pcen: false

loss:
  type: "bce"

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0

augmentation:
  freq_mixstyle:
    enabled: true
    p: 0.5
    alpha: 0.6

data:
  processed_dir: "/mnt/storage/blinky-ml-data/processed_v24"

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v25.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 25
