# Beat Activation CNN — 5-layer wider receptive field
#
# RF = 63 frames = 1008ms (covers one full beat at 60 BPM)
# ~33 KB INT8 (nRF52840 has ~700 KB flash free)
#
# Shared settings are in base.yaml and merged automatically by load_config().
# This file only contains model-specific overrides.

model:
  type: "causal_cnn"
  channels: 32
  kernel_size: 3
  dilations: [1, 2, 4, 8, 16]    # RF: 63 frames = 1008ms
  dropout: 0.1

export:
  max_model_size_kb: 50
