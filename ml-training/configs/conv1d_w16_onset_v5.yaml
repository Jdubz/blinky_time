# Conv1D W16 v5 — kick/snare-focused onset detection
#
# Key change from v3/v4: kick/snare-weighted training targets
#   - Kick onsets (<200 Hz) → target 1.0 (fire strongly)
#   - Snare onsets (200-4k Hz) → target 1.0 (equally important — cuts through mix)
#   - Hi-hat/cymbal onsets (>4k Hz) → target 0.0 (suppress)
#
# This produces the 2-4 major events per bar needed for smooth LED
# animations instead of 5-7/sec raw onset detections that include
# hi-hats and create jittery visuals.
#
# Also includes all v3 improvements:
#   - Frequency positional encoding (FAC 2024)
#   - Online mixup augmentation
#   - Asymmetric focal loss
#
# Architecture unchanged: Conv1D(26->24, k=5) -> Conv1D(24->32, k=5) -> Conv1D(32->1, k=1)
#   ~7K params, ~13 KB INT8, ~7ms inference on Cortex-M4F
#
# Output: 1 channel
#   ch0 = sigmoid(onset_logit) — onset activation (kicks=high, snares=high, hihats=low)
#
# Prerequisites:
#   1. Generate kick-weighted labels (uses combined/ audio dir):
#      python scripts/generate_kick_weighted_targets.py
#
#   2. Prepare dataset:
#      python scripts/prepare_dataset.py --config configs/conv1d_w16_onset_v5.yaml --augment
#
#   3. Train:
#      python train.py --config configs/conv1d_w16_onset_v5.yaml \
#        --output-dir outputs/conv1d_w16_onset_v5

model:
  type: "frame_conv1d"
  channels: [24, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  downbeat: false
  freq_pos_encoding: true

labels:
  labels_type: "kick_weighted"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted"
  target_type: "binary"           # Use per-onset weights directly (kick=1.0, snare=1.0, hihat=0.0)

loss:
  type: "asymmetric_focal"
  gamma_pos: 0.5
  gamma_neg: 2.0

training:
  mixup: true
  mixup_alpha: 0.4

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v5.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 15
