# Conv1D W16 v34d — clean ONSET labels via stem-vs-mix consensus filter
#
# Cleanup (2026-04-29): kick_weighted_drums has ~30% drum-stem bleed —
# htdemucs leaks vocal sibilance / hi-hat / cymbals into the drum stem,
# generating false percussive onsets. We filter each kw onset against
# onsets_consensus (full-mix multi-system detector): keep only kw onsets
# corroborated by >=2 systems within +-70ms.
#
# Audit on edm/ (hand-curated GT):
#   baseline kw                  F1=0.657 P=0.65 R=0.72  (100%)
#   kw cap consensus>=2 +-70ms   F1=0.745 P=0.91 R=0.65  (65% kept) <- this
#   kw cap consensus>=2 +-100ms  F1=0.753 P=0.84 R=0.71  (knee, more lenient)
#   kw cap consensus>=2 +-150ms  F1=0.704 P=0.73 R=0.72  (over-permissive)
#
# +-70ms wins for training: training favours precision (clean labels) over
# recall (complete labels). The +0.26 precision swing eliminates the bleed
# noise that v33 was learning around. Whole-corpus run kept 68.7%
# (827k of 1.20M onsets) over 6397 of 6750 tracks (353 had no consensus
# match and were skipped).
#
# Single-axis change vs v33: only the label source changes. Mel
# config (50 bands, fmin=30, fmax=8000), target_rms_db (-72), gain
# augmentation, model architecture, loss, all match v33 exactly.
# v34/v34b/v34c reframings showed target_rms_db is NOT the binding
# constraint, so we rebase on v33 not v34b.
#
# Falsifiable predictions:
#   - val_peak_F1 > 0.71 (vs v33's 0.69, +0.02 from cleaner labels)
#   - on-device F1 on edm/ > 0.62 (vs v33 b153's 0.570, +0.05)
#   - precision rises more than recall (matches the cleanup signature)
#   - INT8 export std > 0.30 (matches v33; cleaner labels should not collapse)
#
# Negative-result triggers:
#   - val_peak_F1 <= 0.69 with cleaner labels: training was already saturated
#     against the kw label noise floor; gains live in features/architecture
#   - on-device F1 same as v33 b153 (~0.57): label noise was not the binding
#     constraint; revisit firmware peak-picker or attempt model capacity bump
#   - export std < 0.20: cleaner labels produced collapse; bump pos_weight or
#     fall back to v33 labels

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false
  num_output_channels: 0

labels:
  target_type: "binary"
  labels_type: "kick_weighted"
  # The ONLY substantive change vs v33: cleaned label dir instead of raw.
  # Generated by ml-training/scripts/clean_kick_weighted.py with
  # tolerance=70ms, min_systems=2 against onsets_consensus.
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_clean"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

audio:
  n_mels: 50
  fmin: 30
  fmax: 8000

features:
  use_delta: false
  use_pcen: false

loss:
  type: "bce"

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0
  early_stopping_metric: "val_peak_f1"

augmentation:
  freq_mixstyle:
    enabled: true
    p: 0.5
    alpha: 0.6

data:
  processed_dir: "/mnt/storage/blinky-ml-data/processed_v34d"

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v34d_clean_labels.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 27
