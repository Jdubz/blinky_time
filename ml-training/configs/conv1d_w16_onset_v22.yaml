# Conv1D W16 v22 — Revert mel_db_range to 60, no quant-noise
#
# v21 analysis: mel saturation (bass bands at 1.0) is NOT the on-device bottleneck.
# Kick detection is actually the model's strongest category. The on-device F1 gap
# (0.893 offline → 0.471 on-device) is caused by the firmware onset gate being
# too conservative, not by the mel feature distribution.
#
# v22 reverts mel_db_range to 60 (better INT8 resolution: 4.3 vs 3.2 levels/dB)
# and drops quant-noise (negligible benefit, added complexity).
# Same drum-stem labels as v20/v21 (6015 clean tracks).
#
# Architecture: Conv1D(26->32, k=5) -> Conv1D(32->32, k=5) -> Conv1D(32->1, k=1)

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false

labels:
  target_type: "binary"
  labels_type: "kick_weighted"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_drums"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

features:
  use_delta: false
  use_pcen: false

loss:
  type: "bce"

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0

data:
  processed_dir: "/mnt/storage/blinky-ml-data/processed_v22"

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v22.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 25
