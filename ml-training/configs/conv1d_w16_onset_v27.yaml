# Conv1D W16 v27 — 40 mel bands for bass resolution + focal loss
#
# Root cause fix: 26 mel bands gave only 2 bands in the kick range (40-200 Hz).
# Drum onsets and bass guitar notes activated the SAME bands (cosine sim 0.9997).
# 40 bands triples bass resolution (6 bands in kick range), giving the model
# enough spectral information to distinguish kicks from harmonic changes.
#
# Combined with asymmetric focal loss (v26 recipe) for hard-negative emphasis.
#
# Architecture: Conv1D(40->32, k=5) -> Conv1D(32->32, k=5) -> Conv1D(32->1, k=1)
# Model: ~11.3 KB INT8, inference ~10.9ms (within 16ms budget)

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false

labels:
  target_type: "binary"
  labels_type: "kick_weighted"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_drums"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

features:
  use_delta: false
  use_pcen: false

loss:
  type: "asymmetric_focal"
  gamma_pos: 0.0
  gamma_neg: 4.0

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0  # Auto-calculated; focal loss handles class imbalance alongside gamma_neg

augmentation:
  freq_mixstyle:
    enabled: true
    p: 0.5
    alpha: 0.6

data:
  processed_dir: "/mnt/storage/blinky-ml-data/processed_v27"

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v27.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 25
