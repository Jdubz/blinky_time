# Conv1D W16 v23 — Corrected mel filterbank + mic profile augmentation
#
# Key changes from v22:
# - Firmware mel filterbank corrected to match librosa HTK (b117).
#   All 26 bands had wrong bin boundaries since v1, causing a constant
#   4.2 INT8 level error per band. Training features now match device.
# - Mic profile augmentation enabled: applies measured MEMS mic transfer
#   function (per-band gain + noise floor) to training mel, simulating
#   the actual acoustic path through the device microphone.
# - Same drum-stem labels, same architecture, same loss.
#
# Architecture: Conv1D(26->32, k=5) -> Conv1D(32->32, k=5) -> Conv1D(32->1, k=1)
# NOTE: first layer widened from 24 (v22) to 32 channels — more params but within INT8 size budget

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false

labels:
  target_type: "binary"
  labels_type: "kick_weighted"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_drums"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

features:
  use_delta: false
  use_pcen: false

loss:
  type: "bce"

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0

data:
  processed_dir: "/mnt/storage/blinky-ml-data/processed_v23"

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v23.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 25
