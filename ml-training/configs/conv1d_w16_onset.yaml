# Conv1D W16 — onset detection model for AudioTracker
#
# Short window (16 frames = 256ms), single output (onset activation only).
# Same backbone as deployed W64 — just shorter context window.
# Trained on beat-position labels, but with 144ms RF it detects acoustic
# onsets (kicks/snares), not metrical beats. The model cannot distinguish
# on-beat from off-beat transients.
#
# In AudioTracker, this model drives visual pulse detection and PLL phase
# refinement. BPM estimation uses spectral flux (NN-independent).
#
# Architecture: Conv1D(26->24, k=5) -> Conv1D(24->32, k=5) -> Conv1D(32->1, k=1)
#   ~7K params, ~13 KB INT8, ~7ms inference on Cortex-M4F
#   Receptive field: 9 frames = 144ms (captures full kick transient 10-50ms)
#
# Output: 1 channel
#   ch0 = sigmoid(onset_logit) — onset activation (kicks/snares)

model:
  type: "frame_conv1d"
  channels: [24, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  downbeat: false             # Onset only — single output channel

export:
  output_header: "../blinky-things/audio/frame_onset_model_data.h"
  c_array_name: "frame_beat_model_data"
  max_model_size_kb: 15
