# Conv1D W16 v35b — multi-channel instrument output (kick / snare / hihat)
#
# Single-axis change vs v34d: num_output_channels 1 → 3, labels_type
# kick_weighted → instrument. Same mel config (50 bands, 30-8000 Hz),
# same backbone, same loss, same cleaned labels (kick_weighted_clean,
# consensus-filtered ≥2 systems within ±70 ms — see v34d for the audit
# that proved this gives +0.26 precision over raw kick_weighted_drums).
#
# Tests whether splitting the prediction problem into per-instrument
# heads improves precision-without-recall-loss (the open question from
# project_onset_ceiling_synthesis: "multi-channel instrument model
# remains a viable precision-without-recall-loss path").
#
# How it works: clean_kick_weighted.py preserves the `type` field
# ("kick"/"snare"/"hihat") while filtering out un-corroborated onsets,
# so per-instrument routing benefits from the same label-quality
# improvement v34d demonstrated. Training pipeline (prepare_dataset.py
# labels_type=instrument branch, lines ~897-913) builds 3 binary
# target arrays per chunk. Conv1D output goes from 32→1 to 32→3.
# Loss is sum of per-channel BCE.
#
# Firmware deploy semantic: max(kick, snare) is the onset signal
# (hihat suppressed by default). Per-channel routing is a bonus —
# combinable with the (centroid, crest) firing-routing rule from #114.
#
# History: v8 was a prior attempt at this (asymmetric_focal loss,
# narrower channels [24,32], freq_pos_encoding=true). v8 was abandoned
# pre-deployment; no on-device F1 number recorded. v35b uses the v33-
# proven recipe instead — only the output head changes.
#
# Architecture: Conv1D [32,32] k=[5,5] W16. Output conv: 32×3 + 3 = 99
# weights (vs 33 for single-channel). Total params ≈ 13,283 (vs v33's
# 13,217). Negligible size impact, fits in 27 KB easily.
#
# Falsifiable predictions:
#   - max(kick, snare) channel onset F1 (vs onsets_consensus on edm/)
#     > 0.617 within 30 epochs. Even a tied F1 is informative if
#     precision goes up.
#   - kick channel precision > 0.39 (v33's overall precision).
#   - At least one channel reaches val_peak_F1 ≥ v33's 0.394 (val labels
#     get split per-channel, so per-channel ratios will be sparser; bar
#     for "no collapse" applies per-channel).
#   - INT8 export std ≥ 0.30 on at least the kick channel.
#
# Negative-result triggers:
#   - max-of-channels F1 ≤ 0.62 within ±0.02 of v33 → instrument-
#     decoupling didn't unlock anything. The visualization-routing
#     value (per-instrument firmware effects) might still justify it,
#     but the F1 ceiling argument is exhausted.
#   - All three channels collapse (std < 0.20) → smaller per-class
#     positive density tripped the v30/v31/v32 collapse pattern; revisit
#     pos_weight or use focal loss.

model:
  type: "frame_conv1d"
  channels: [32, 32]
  kernel_sizes: [5, 5]
  window_frames: 16
  dropout: 0.1
  freq_pos_encoding: false
  num_output_channels: 3
  output_channel_names: ["kick", "snare", "hihat"]

labels:
  target_type: "binary"
  labels_type: "instrument"
  kick_weighted_dir: "/mnt/storage/blinky-ml-data/labels/kick_weighted_clean"
  neighbor_weight: 0.25
  label_shift_frames: 1
  hard_binary_threshold: 0.1

audio:
  n_mels: 50
  fmin: 30
  fmax: 8000

features:
  use_delta: false
  use_pcen: false

loss:
  type: "bce"

training:
  mixup: false
  epochs: 60
  patience: 15
  pos_weight: 0           # auto per-channel from data
  early_stopping_metric: "val_peak_f1"

augmentation:
  freq_mixstyle:
    enabled: true
    p: 0.5
    alpha: 0.6

data:
  processed_dir: "/mnt/nvme/processed_v35b"

export:
  output_header: "../blinky-things/audio/frame_onset_model_data_v35b_instrument.h"
  c_array_name: "frame_onset_model_data"
  max_model_size_kb: 27
